<head>

    <style>
        body {
            font-family: Arial, sans-serif;

        }

<body>
    <div class="container">
        <h1 style="color:blue;text-align:center;">我的文章管理系统</h1>

        <!-- 登录验证区 -->
        <div class="login-section" id="loginSection">
            <h3>请输入管理密码</h3>
            <input type="password" id="adminPassword" placeholder="输入管理密码">
            <button onclick="checkPassword()">登录</button>
        </div>

        <!-- 功能区（登录后显示） -->
        <div id="mainContent" class="hidden">
            <!-- 添加文章区 -->
            <div class="action-section">
                <h3>添加新文章</h3>
                <input type="text" id="articleTitle" placeholder="文章标题">
                <textarea id="articleContent" rows="5" placeholder="文章内容"></textarea>
                <button onclick="addArticle()">发布文章</button>
            </div>

            <!-- 查询区 -->
            <div class="action-section">
                <h3>查询文章</h3>
                <input type="text" id="searchKeyword" placeholder="输入标题关键词查询">
                <button onclick="searchArticles()">查询</button>
                <button onclick="loadAllArticles()">显示全部</button>
            </div>

            <!-- 文章列表区 -->
            <div id="articleList"></div>
        </div>
    </div>

    <!-- 引入 Supabase JS 库（只引入一次） -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // ========== 配置区：请替换为你自己的信息 ==========
        // ========== 配置区：请替换为你自己的信息 ==========
        const SUPABASE_URL = "https://ujqfiphuffjeihdvlupf.supabase.co"; // 你的 Project URL
        const SUPABASE_ANON_KEY = "sb_publishable_7qutUQOaUp_HKon9uLK6PQ_LkM_Bx0y"; // 你的 anon public key
        const ADMIN_PASSWORD = "wm001133"; // 自定义管理密码
        // =================================================
        // =================================================

        // 初始化 Supabase 客户端（使用新变量名，避免冲突）
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 密码验证
        function checkPassword() {
            const inputPwd = document.getElementById("adminPassword").value;
            if (inputPwd === ADMIN_PASSWORD) {
                document.getElementById("loginSection").classList.add("hidden");
                document.getElementById("mainContent").classList.remove("hidden");
                loadAllArticles(); // 登录后自动加载所有文章
            } else {
                alert("密码错误，请重试！");
            }
        }

        // 加载所有文章
        async function loadAllArticles() {
            const { data, error } = await supabaseClient
                .from("articletable")
                .select("*")
                .order("created_at", { ascending: false });

            if (error) {
                alert("加载文章失败：" + error.message);
                return;
            }
            renderArticles(data);
        }

        // 按标题关键词查询文章
        async function searchArticles() {
            const keyword = document.getElementById("searchKeyword").value.trim();
            if (!keyword) {
                alert("请输入查询关键词");
                return;
            }

            const { data, error } = await supabaseClient
                .from("articletable")
                .select("*")
                .ilike("title", `%${keyword}%`)
                .order("created_at", { ascending: false });

            if (error) {
                alert("查询失败：" + error.message);
                return;
            }
            renderArticles(data);
        }

        // 添加新文章
        async function addArticle() {
            const title = document.getElementById("articleTitle").value.trim();
            const content = document.getElementById("articleContent").value.trim();

            if (!title || !content) {
                alert("标题和内容不能为空！");
                return;
            }

            const { error } = await supabaseClient
                .from("articletable")
                .insert([{ title, content }]);

            if (error) {
                alert("发布失败：" + error.message);
                return;
            }

            alert("文章发布成功！");
            document.getElementById("articleTitle").value = "";
            document.getElementById("articleContent").value = "";
            loadAllArticles(); // 刷新列表
        }

        // 删除文章
        async function deleteArticle(articleId) {
            if (!confirm("确定要删除这篇文章吗？此操作不可恢复！")) return;

            const { error } = await supabaseClient
                .from("articletable")
                .delete()
                .eq("id", articleId);

            if (error) {
                alert("删除失败：" + error.message);
                return;
            }

            alert("文章删除成功！");
            loadAllArticles(); // 刷新列表
        }

        // 渲染文章列表到页面
        function renderArticles(articles) {
            const listEl = document.getElementById("articleList");
            listEl.innerHTML = "";

            if (articles.length === 0) {
                listEl.innerHTML = "<p>暂无文章数据</p>";
                return;
            }

            articles.forEach(article => {
                const articleEl = document.createElement("div");
                articleEl.className = "article-item";
                articleEl.innerHTML = `
                    <h3>${escapeHtml(article.title)}</h3>
                    <p>${escapeHtml(article.content)}</p>
                    <small>发布时间：${new Date(article.created_at).toLocaleString()}</small>
                    <br>
                    <button class="delete-btn" onclick="deleteArticle(${article.id})">删除</button>
                `;
                listEl.appendChild(articleEl);
            });
        }

        // 防止XSS攻击的HTML转义函数
        function escapeHtml(unsafe) {
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>

<script>
  window.addEventListener('tabs:register', () => {
    let { activeClass } = CONFIG.comments;
    if (CONFIG.comments.storage) {
      activeClass = localStorage.getItem('comments_active') || activeClass;
    }
    if (activeClass) {
      let activeTab = document.querySelector(`a[href="#comment-${activeClass}"]`);
      if (activeTab) {
        activeTab.click();
      }
    }
  });
  if (CONFIG.comments.storage) {
    window.addEventListener('tabs:click', event => {
      if (!event.target.matches('.tabs-comment .tab-content .tab-pane')) return;
      let commentClass = event.target.classList[1];
      localStorage.setItem('comments_active', commentClass);
    });
  }
</script>
